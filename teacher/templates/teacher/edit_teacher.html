{% extends 'Home/base.html' %}
{% load static %}

{% block content %}
<div class="page-wrapper">
    <div class="content container-fluid">
        
        <div class="page-header">
            <div class="row align-items-center">
                <div class="col">
                    <h3 class="page-title">Modifier l'Enseignant</h3>
                    <ul class="breadcrumb">
                        <li class="breadcrumb-item"><a href="{% url 'teacher_list' %}">Enseignants</a></li>
                        <li class="breadcrumb-item active">Modifier</li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-sm-12">
                <div class="card">
                    <div class="card-body">
                        <form method="POST" action="{% url 'edit_teacher' teacher.id %}" enctype="multipart/form-data">
                            {% csrf_token %}
                            <div class="row">
                                <div class="col-12">
                                    <h5 class="form-title"><span>Informations Personnelles</span></h5>
                                </div>

                                <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                        <label>ID Employé</label>
                                        <input type="text" name="employee_id" class="form-control" value="{{ teacher.employee_id }}" readonly>
                                    </div>
                                </div>

                                <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                        <label>Prénom</label>
                                        <input type="text" name="first_name" class="form-control" value="{{ teacher.user.first_name }}" required>
                                    </div>
                                </div>

                                <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                        <label>Nom de famille</label>
                                        <input type="text" name="last_name" class="form-control" value="{{ teacher.user.last_name }}" required>
                                    </div>
                                </div>

                                <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                        <label>Genre</label>
                                        <select name="gender" class="form-control" required>
                                            <option value="Male" {% if teacher.gender == 'Male' %}selected{% endif %}>Masculin</option>
                                            <option value="Female" {% if teacher.gender == 'Female' %}selected{% endif %}>Féminin</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                        <label>Téléphone</label>
                                        <input type="text" name="phone" class="form-control" value="{{ teacher.phone }}" required>
                                    </div>
                                </div>

                                <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                        <label>Email</label>
                                        <input type="email" name="email" class="form-control" value="{{ teacher.user.email }}" required>
                                    </div>
                                </div>

                                <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                        <label>Département</label>
                                        <select name="department" class="form-control" required>
                                            {% for dept in departments %}
                                                <option value="{{ dept.id }}" {% if teacher.department.id == dept.id %}selected{% endif %}>
                                                    {{ dept.name }}
                                                </option>
                                            {% endfor %}
                                        </select>
                                    </div>
                                </div>

                                <div class="col-12">
                                    <button type="submit" class="btn btn-primary">Mettre à jour</button>
                                    <a href="{% url 'teacher_list' %}" class="btn btn-secondary">Annuler</a>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
