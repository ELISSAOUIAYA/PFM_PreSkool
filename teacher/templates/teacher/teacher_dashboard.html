{% extends 'home/base.html' %}
{% load static %}

{% block content %}
<div class="page-wrapper">
    <div class="content container-fluid">
        
        <div class="page-header">
            <div class="row">
                <div class="col-sm-12">
                    <h3 class="page-title">Tableau de bord Enseignant</h3>
                    <ul class="breadcrumb">
                        <li class="breadcrumb-item active">Dashboard</li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-xl-3 col-sm-6 col-12 d-flex">
                <div class="card bg-one w-100">
                    <div class="card-body">
                        <div class="db-widgets d-flex justify-content-between align-items-center">
                            <div class="db-icon">
                                <i class="fas fa-chalkboard-teacher"></i>
                            </div>
                            <div class="db-info">
                                <h3>{{ total_teachers }}</h3>
                                <h6>Total Enseignants</h6>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            </div>

        <div class="row">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">Bienvenue sur votre gestionnaire</h5>
                    </div>
                    <div class="card-body">
                        <p>Utilisez le menu latéral pour gérer la liste des enseignants ou en ajouter de nouveaux.</p>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>
{% endblock %}
