{% extends 'Home/base.html' %}
{% block content %}
<div class="content container-fluid">
    <div class="page-header">
        <h3 class="page-title"> Résultats</h3>
    </div>
    <div class="row">
        <div class="col-sm-12">
            <div class="card card-table">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover table-center mb-0">
                            <thead>
                                <tr>
                                    <th>Examen</th>
                                    <th>Note</th>
                                    <th>Remarques</th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for m in results %}
                                <tr>
                                    <td>{{ m.exam.name }}</td>
                                    <td><span class="badge badge-success">{{ m.score }}</span></td>
                                    <td>{{ m.remarks|default:"-" }}</td>
                                </tr>
                                {% empty %}
                                <tr><td colspan="3" class="text-center">Aucune note disponible.</td></tr>
                                {% endfor %}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
