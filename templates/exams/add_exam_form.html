{% extends 'home/base.html' %}

{% block content %}
<div class="page-wrapper">
    <div class="content container-fluid">
        <div class="page-header">
            <div class="row align-items-center">
                <div class="col">
                    <h3 class="page-title">Add Examen</h3>
                    <ul class="breadcrumb">
                        <li class="breadcrumb-item"><a href="{% url 'exam_list' %}">Exams</a></li>
                        <li class="breadcrumb-item active">Add Examen</li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-body">
                        <form method="POST">
                            {% csrf_token %}
                            <div class="form-group row">
                                <label class="col-lg-3 col-form-label">Nom de l'examen:</label>
                                <div class="col-lg-9">
                                    <input type="text" name="name" class="form-control" placeholder="Entrez le nom" required>
                                </div>
                            </div>
                            <div class="form-group row">
                                <label class="col-lg-3 col-form-label">Matière:</label>
                                <div class="col-lg-9">
                                    <select name="subject" class="form-control" required>
                                        <option value="">---------</option>
                                        {% for subject in subjects %}
                                            <option value="{{ subject.id }}">{{ subject.name }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                            </div>
                            <div class="form-group row">
                                <label class="col-lg-3 col-form-label">Date de l'examen:</label>
                                <div class="col-lg-9">
                                    <input type="date" name="date" class="form-control" required>
                                </div>
                            </div>
                            <div class="form-group row">
                                <label class="col-lg-3 col-form-label">Type d'examen:</label>
                                <div class="col-lg-9">
                                    <select name="exam_type" class="form-control">
                                        <option value="Contrôle Continu">Contrôle Continu</option>
                                        <option value="Examen Final">Examen Final</option>
                                    </select>
                                </div>
                            </div>
                            <div class="text-right mt-4">
                                <button type="submit" class="btn btn-primary" style="background-color: #2c5e77;">SAVE</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
