{% extends 'Home/base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-md-8">
            <h2>{% if department %}📝 Modifier le Département{% else %}🏢 Créer un Département{% endif %}</h2>
            <hr>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <form method="POST">
                {% csrf_token %}
                
                <div class="form-group">
                    <label for="name"><strong>Nom du Département</strong></label>
                    <input type="text" class="form-control" id="name" name="name" 
                           value="{% if department %}{{ department.name }}{% endif %}" 
                           required>
                </div>

                <div class="form-group">
                    <label for="code"><strong>Code</strong></label>
                    <input type="text" class="form-control" id="code" name="code" 
                           value="{% if department %}{{ department.code }}{% endif %}" 
                           required>
                </div>

                <div class="form-group">
                    <label for="head_teacher"><strong>Chef de Département</strong></label>
                    <input type="text" class="form-control" id="head_teacher" name="head_teacher" 
                           value="{% if department %}{{ department.head_teacher }}{% endif %}">
                </div>

                <div class="form-group">
                    <label for="description"><strong>Description</strong></label>
                    <textarea class="form-control" id="description" name="description" rows="4">{% if department %}{{ department.description }}{% endif %}</textarea>
                </div>

                <div class="form-group">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> {% if department %}Modifier{% else %}Créer{% endif %}
                    </button>
                    <a href="{% if department %}{% url 'department-detail' department.pk %}{% else %}{% url 'department-list' %}{% endif %}" class="btn btn-secondary">
                        <i class="fas fa-times"></i> Annuler
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
