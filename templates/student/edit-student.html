{% extends 'Home/base.html' %}
{% load static %}

{% block content %}
<style>
    /* Correctif pour supprimer le vide à gauche et coller à la sidebar */
    .page-wrapper {
        margin-left: 240px !important;
        position: relative !important;
        left: 0 !important;
    }
    .content.container-fluid {
        width: 100% !important;
        max-width: 100% !important;
        padding: 25px !important;
        margin: 0 !important;
    }
</style>

<div class="page-wrapper">
    <div class="content container-fluid">
        <div class="page-header">
            <div class="row align-items-center">
                <div class="col">
                    <h3 class="page-title font-weight-bold">Modifier l'étudiant</h3>
                    <ul class="breadcrumb">
                        <li class="breadcrumb-item"><a href="{% url 'student_list' %}">Étudiants</a></li>
                        <li class="breadcrumb-item active">Modifier</li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-sm-12">
                <div class="card shadow-sm border-0" style="border-radius: 15px;">
                    <div class="card-body">
                        <form method="POST" enctype="multipart/form-data">
                            {% csrf_token %}
                            <div class="row">
                                <div class="col-12">
                                    <h5 class="form-title text-primary mb-4"><span>Informations Personnelles</span></h5>
                                </div>
                                
                                <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                        <label>Prénom</label>
                                        <input type="text" name="first_name" class="form-control" value="{{ student.user.first_name }}">
                                    </div>
                                </div>
                                <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                        <label>Nom</label>
                                        <input type="text" name="last_name" class="form-control" value="{{ student.user.last_name }}">
                                    </div>
                                </div>
                                <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                        <label>ID Étudiant</label>
                                        <input type="text" name="student_id" class="form-control" value="{{ student.student_id }}" readonly>
                                    </div>
                                </div>
                                <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                        <label>Genre</label>
                                        <select name="gender" class="form-control">
                                            <option value="Female" {% if student.gender == 'Female' %}selected{% endif %}>Féminin</option>
                                            <option value="Male" {% if student.gender == 'Male' %}selected{% endif %}>Masculin</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="col-12 mt-4">
                                    <button type="submit" class="btn btn-warning text-white font-weight-bold px-5">Mettre à jour le profil</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
