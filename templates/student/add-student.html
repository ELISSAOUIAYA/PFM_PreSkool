
{% extends 'Home/base.html' %}
{% load static %}

{% block content %}
<style>
    /* Correctif pour coller à la sidebar et supprimer le vide */
    .page-wrapper {
        margin-left: 240px !important;
        position: relative !important;
        left: 0 !important;
    }
    .content.container-fluid {
        width: 100% !important;
        max-width: 100% !important;
        padding: 25px !important;
        margin: 0 !important;
    }
    .form-title {
        border-bottom: 2px solid #ff9b44;
        padding-bottom: 10px;
        color: #ff9b44;
        font-weight: bold;
    }
</style>

<div class="page-wrapper">
    <div class="content container-fluid">
        
        <div class="page-header">
            <div class="row align-items-center">
                <div class="col">
                    <h3 class="page-title font-weight-bold">Ajouter un Étudiant</h3>
                    <ul class="breadcrumb">
                        <li class="breadcrumb-item"><a href="{% url 'student_list' %}">Étudiants</a></li>
                        <li class="breadcrumb-item active">Ajouter</li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-sm-12">
                <div class="card shadow-sm border-0" style="border-radius: 15px;">
                    <div class="card-body">
                        <form method="POST" enctype="multipart/form-data">
                            {% csrf_token %}
                            
                            <div class="row">
                                <div class="col-12">
                                    <h5 class="form-title mb-4"><span>Informations de l'étudiant</span></h5>
                                </div>
                                <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                        <label>Prénom</label>
                                        <input type="text" class="form-control" name="first_name" required>
                                    </div>
                                </div>
                                <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                        <label>Nom</label>
                                        <input type="text" class="form-control" name="last_name" required>
                                    </div>
                                </div>
                                <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                        <label>ID Étudiant (Unique)</label>
                                        <input type="text" class="form-control" name="student_id" placeholder="Ex: ST-2026-001" required>
                                    </div>
                                </div>
                                <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                        <label>Genre</label>
                                        <select class="form-control" name="gender" required>
                                            <option value="">Sélectionner</option>
                                            <option value="Female">Féminin</option>
                                            <option value="Male">Masculin</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                        <label>Date de Naissance</label>
                                        <input type="date" class="form-control" name="date_of_birth" required>
                                    </div>
                                </div>
                                <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                        <label>Classe / Filière</label>
                                        <input type="text" class="form-control" name="student_class" placeholder="Ex: IDAI S6" required>
                                    </div>
                                </div>
                                <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                        <label>Photo de l'étudiant</label>
                                        <input type="file" class="form-control" name="student_image">
                                    </div>
                                </div>

                                <div class="col-12 mt-4">
                                    <h5 class="form-title mb-4"><span>Informations des Parents</span></h5>
                                </div>
                                <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                        <label>Nom du Père</label>
                                        <input type="text" class="form-control" name="father_name" required>
                                    </div>
                                </div>
                                <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                        <label>Téléphone du Père</label>
                                        <input type="text" class="form-control" name="father_mobile" required>
                                    </div>
                                </div>

                                <div class="col-12 mt-4 text-right">
                                    <button type="submit" class="btn btn-warning text-white font-weight-bold px-5">Enregistrer l'étudiant</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
