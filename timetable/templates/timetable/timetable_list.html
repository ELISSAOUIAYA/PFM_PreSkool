{% extends 'Home/base.html' %}
{% block content %}
<div class="page-wrapper">
    <div class="content container-fluid">
        <div class="page-header">
            <div class="row align-items-center">
                <div class="col"><h3 class="page-title">Emploi du Temps</h3></div>
                <div class="col-auto float-right ml-auto">
                    <a href="{% url 'timetable_add' %}" class="btn btn-primary"><i class="fas fa-plus"></i></a>
                </div>
            </div>
        </div>
        <div class="table-responsive">
            <table class="table table-hover table-center mb-0">
                <thead>
                    <tr>
                        <th>Matière</th><th>Enseignant</th><th>Jour</th><th>Horaire</th><th>Salle</th><th class="text-right">Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for t in timetables %}
                    <tr>
                        <td>{{ t.subject }}</td><td>{{ t.teacher }}</td><td>{{ t.day_of_week }}</td>
                        <td>{{ t.start_time }} - {{ t.end_time }}</td><td>{{ t.room }}</td>
                        <td class="text-right">
                            <a href="{% url 'timetable_edit' t.pk %}" class="btn btn-sm bg-success-light mr-2"><i class="fas fa-pen"></i></a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
